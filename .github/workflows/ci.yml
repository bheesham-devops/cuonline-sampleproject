name: 🐳 Build and Push Docker Image to Artifact Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: cu-online-sample-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 🔖 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run Unit Tests
        run: mvn --batch-mode --no-transfer-progress test

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🌐 Get current epoch time
        run: echo "EPOCH=$(date +%s)" >> $GITHUB_ENV

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCR_SA_KEY }}

      - name: 🔑 Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCR_REGISTRY_HOST }} --quiet

      - name: 🐳 Build, Tag and Push Docker Image
        run: |
          SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/' '-')
          IMAGE_TAG="${SAFE_REF}-${{ env.EPOCH }}"

          docker build --no-cache -t $IMAGE_NAME:$IMAGE_TAG .

          docker tag $IMAGE_NAME:$IMAGE_TAG \
            ${{ secrets.GCR_REGISTRY }}/$IMAGE_NAME:$IMAGE_TAG

          docker tag $IMAGE_NAME:$IMAGE_TAG \
            ${{ secrets.GCR_REGISTRY }}/$IMAGE_NAME:latest

          docker push ${{ secrets.GCR_REGISTRY }}/$IMAGE_NAME:$IMAGE_TAG
          docker push ${{ secrets.GCR_REGISTRY }}/$IMAGE_NAME:latest

          echo "✅ Pushed: ${{ secrets.GCR_REGISTRY }}/$IMAGE_NAME:$IMAGE_TAG"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: 📝 Update image tag in GitOps repo
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          git clone https://bheesham-devops:${GITOPS_TOKEN}@github.com/bheesham-devops/cuonline-gitops.git /tmp/cuonline-gitops
          cd /tmp/cuonline-gitops

          # Update the image tag in values.yaml
          sed -i "s|^  tag: .*|  tag: \"${{ env.IMAGE_TAG }}\"|" charts/cu-online-sample-app/values.yaml

          git config user.email "bheeshamkumar@gmail.com"
          git config user.name "bheesham-devops"
          git add charts/cu-online-sample-app/values.yaml
          git commit -m "chore: update image tag to ${{ env.IMAGE_TAG }} [skip ci]"
          git push origin main
          echo "✅ GitOps repo updated with tag: ${{ env.IMAGE_TAG }}"

